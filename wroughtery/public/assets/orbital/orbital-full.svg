<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbital — full-bleed detailed icon. Use for: Play Store 512, hi-res app icon. No transparency, no rounding (the OS masks). -->
  <rect width="512" height="512" fill="#10151E"/>
  <!-- left edge motion field (phosphor teal), parallax: bold near + faint far, fading at top/bottom -->
  <g fill="#6FD8C6">
    <circle cx="130" cy="152" r="4" opacity="0.22"/>
    <circle cx="142" cy="168" r="5" opacity="0.40"/>
    <circle cx="118" cy="196" r="10"/>
    <circle cx="100" cy="224" r="4.5" opacity="0.35"/>
    <circle cx="134" cy="250" r="11"/>
    <circle cx="146" cy="276" r="5.5" opacity="0.45"/>
    <circle cx="110" cy="300" r="9.5" opacity="0.95"/>
    <circle cx="126" cy="330" r="9" opacity="0.9"/>
    <circle cx="104" cy="348" r="4" opacity="0.30"/>
    <circle cx="118" cy="366" r="4" opacity="0.20"/>
  </g>
  <!-- right edge motion field -->
  <g fill="#6FD8C6">
    <circle cx="388" cy="158" r="4" opacity="0.22"/>
    <circle cx="366" cy="180" r="5" opacity="0.40"/>
    <circle cx="394" cy="210" r="10.5"/>
    <circle cx="414" cy="236" r="4.5" opacity="0.35"/>
    <circle cx="374" cy="258" r="10"/>
    <circle cx="362" cy="288" r="5.5" opacity="0.45"/>
    <circle cx="400" cy="308" r="10.5" opacity="0.95"/>
    <circle cx="380" cy="338" r="9" opacity="0.9"/>
    <circle cx="408" cy="356" r="4" opacity="0.30"/>
    <circle cx="396" cy="368" r="3.5" opacity="0.20"/>
  </g>
  <!-- level reference + steady point (signal amber) -->
  <line x1="224" y1="256" x2="244" y2="256" stroke="#6FD8C6" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="268" y1="256" x2="288" y2="256" stroke="#6FD8C6" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="256" cy="256" r="8" fill="#E0A24A"/>
</svg>
